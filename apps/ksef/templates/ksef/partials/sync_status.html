{% if running %}
<div id="sync-status"
     hx-get="{% url 'ksef:sync_status' %}"
     hx-trigger="every 3s"
     hx-target="#sync-status"
     hx-swap="outerHTML">
  <div class="alert alert-primary d-flex align-items-center gap-3 py-2 mb-3" role="alert">
    <div class="spinner-border spinner-border-sm text-primary flex-shrink-0" role="status"></div>
    <div class="flex-grow-1 small">
      <strong>Synchronizacja w toku</strong>
      {% if running.current_stage %}
      — {{ running.current_stage }}
      {% endif %}
      {% if running.invoices_fetched %}
      <span class="text-muted ms-2">{{ running.invoices_fetched }} pobr. / {{ running.invoices_new }} nowych</span>
      {% endif %}
      <span class="text-muted ms-2">
        <i class="bi bi-clock me-1"></i>{{ running.started_at|timesince }} temu
      </span>
    </div>
    <button class="btn btn-sm btn-outline-danger flex-shrink-0"
            hx-post="{% url 'ksef:sync_cancel' %}"
            hx-target="#sync-status"
            hx-swap="outerHTML"
            hx-confirm="Anulować synchronizację? Pobrane faktury zostaną zachowane.">
      <i class="bi bi-x-circle me-1"></i>Anuluj
    </button>
  </div>
</div>
{% else %}
<div id="sync-status"></div>
{% endif %}
