{% for buyer in buyers %}
<div class="buyer-result list-group-item list-group-item-action py-2 px-3"
     style="cursor:pointer;"
     data-buyer-id="{{ buyer.pk }}"
     data-buyer-nip="{{ buyer.nip }}"
     data-buyer-name="{{ buyer.name }}"
     data-buyer-address="{{ buyer.address }}">
  <div class="fw-semibold small">{{ buyer.name }}</div>
  <div class="text-muted" style="font-size:.8rem;">NIP: {{ buyer.nip }}{% if buyer.address %} · {{ buyer.address|truncatechars:60 }}{% endif %}</div>
</div>
{% empty %}
<div class="list-group-item py-2 px-3 text-muted small">Brak wyników dla „{{ q }}"</div>
{% endfor %}
