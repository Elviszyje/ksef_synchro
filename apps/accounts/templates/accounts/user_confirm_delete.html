{% extends "base.html" %}
{% block page_title %}Usuń użytkownika{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-person-x text-danger" style="font-size:2.5rem;"></i>
        <h5 class="mt-3">Usuń użytkownika</h5>
        <p class="text-muted">Czy na pewno chcesz usunąć konto <strong>{{ object.username }}</strong>? Operacja jest nieodwracalna.</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Tak, usuń</button>
          <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary">Anuluj</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
