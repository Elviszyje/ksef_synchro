<form hx-post="{% url 'accounts:user_set_password' target_user.pk %}"
      hx-target="#passwordModalBody"
      hx-swap="innerHTML">
  {% csrf_token %}
  <div class="modal-header">
    <h5 class="modal-title">Zmień hasło — {{ target_user.username }}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
  </div>
  <div class="modal-body">
    {% if form.non_field_errors %}
    <div class="alert alert-danger py-2 small">{{ form.non_field_errors }}</div>
    {% endif %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Anuluj</button>
    <button type="submit" class="btn btn-primary btn-sm">Zapisz hasło</button>
  </div>
</form>
